version: '3.8'

services:
  training:
    build:
      context: ..
      dockerfile: docker/training.Dockerfile
    volumes:
      - ../src/ml/training:/app/training
      - ../models:/app/models
      - ../data:/app/data
    environment:
      - CUDA_VISIBLE_DEVICES=0
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    command: python training/train.py --data /app/data/replays.jsonl --epochs 50 --batch-size 32

  # Optional: Jupyter notebook for experimentation
  notebook:
    build:
      context: ..
      dockerfile: docker/training.Dockerfile
    ports:
      - "8888:8888"
    volumes:
      - ../src/ml/training:/app/training
      - ../models:/app/models
      - ../notebooks:/app/notebooks
    environment:
      - CUDA_VISIBLE_DEVICES=0
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    command: jupyter notebook --no-browser --allow-root --ip=0.0.0.0 --port=8888 --NotebookApp.token=''
